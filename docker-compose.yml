version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: securefair-db
    environment:
      POSTGRES_USER: securefair
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: securefair
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U securefair"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - securefair-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: securefair-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://securefair:changeme@db:5432/securefair
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - securefair-network

  # React Frontend (Vite + TypeScript)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # VITE_* vars are baked into the bundle at build time.
        # For production, replace localhost with a real hostname/IP.
        VITE_API_URL: http://localhost:8000
    container_name: securefair-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - securefair-network

volumes:
  postgres_data:

networks:
  securefair-network:
    driver: bridge
